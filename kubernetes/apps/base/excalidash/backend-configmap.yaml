apiVersion: v1
kind: ConfigMap
metadata:
  name: excalidash-backend-config
data:
  DATABASE_PROVIDER: "sqlite"
  DATABASE_URL: "file:/app/data/dev.db"
  AUTH_MODE: "local"
  TRUST_PROXY: "1"
  ENFORCE_HTTPS_REDIRECT: "true"
  UPDATE_CHECK_OUTBOUND: "true"
  DISABLE_ONBOARDING_GATE: "false"
  NODE_ENV: "production"
