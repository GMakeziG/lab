apiVersion: apps/v1
kind: Deployment
metadata:
  name: excalidash-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: excalidash-backend
  template:
    metadata:
      labels:
        app: excalidash-backend
    spec:
      containers:
        - name: backend
          image: zimengxiong/excalidash-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: excalidash-backend-config
            - secretRef:
                name: excalidash-backend-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: excalidash-db
