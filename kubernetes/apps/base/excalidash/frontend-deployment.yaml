apiVersion: apps/v1
kind: Deployment
metadata:
  name: excalidash-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: excalidash-frontend
  template:
    metadata:
      labels:
        app: excalidash-frontend
    spec:
      containers:
        - name: frontend
          image: zimengxiong/excalidash-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6767
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: "http://excalidash-backend.excalidash-test.svc.cluster.local:8000"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

