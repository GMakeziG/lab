apiVersion: v1
kind: Service
metadata:
  name: excalidash-backend
spec:
  type: ClusterIP
  selector:
    app: excalidash-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: excalidash-frontend
spec:
  type: ClusterIP
  selector:
    app: excalidash-frontend
  ports:
    - name: http
      port: 6767
      targetPort: 6767
      protocol: TCP
