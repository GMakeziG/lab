apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkding
  namespace: apps-staging
spec:
  interval: 15m
  chart:
    spec:
      chart: linkding
      sourceRef:
        kind: HelmRepository
        name: pascaliske
        namespace: flux-system
      interval: 1h
  values:
    env:
      - name: TZ
        value: America/Los_Angeles

    persistentVolumeClaim:
      create: true
      size: 1Gi

    service:
      type: ClusterIP

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
