apiVersion: v1
kind: ConfigMap
metadata:
  name: recipes-nginx-config
  namespace: apps
data:
  nginx-config: |-
    events {
      worker_connections 1024;
    }
    http {
      include mime.types;
      server {
        listen 80;
        server_name _;

        client_max_body_size 16M;

        location /static/ {
          alias /static/;
        }

        location /media/ {
          alias /media/;
        }
      }
    }
