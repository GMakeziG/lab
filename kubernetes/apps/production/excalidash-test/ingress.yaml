apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: excalidash-test
  namespace: excalidash-test
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: excalidash-test-strip-api@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - draw-test.ninjatronics.io
      secretName: excalidash-test-ninjatronics-io-tls
  rules:
    - host: draw-test.ninjatronics.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: excalidash-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: excalidash-frontend
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: excalidash-test
spec:
  stripPrefix:
    prefixes:
      - /api
