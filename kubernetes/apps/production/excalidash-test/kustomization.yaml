apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: excalidash-test

resources:
  - namespace.yaml
  - ../../base/excalidash
  - ingress.yaml
  - externalsecret.yaml

patchesStrategicMerge:
  - |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: excalidash-backend-config
    data:
      FRONTEND_URL: "https://draw-test.ninjatronics.io"
      DISABLE_ONBOARDING_GATE: "true"
