apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: excalidash-test

resources:
  - namespace.yaml
  - ../../base/excalidash
  - ingress.yaml

secretGenerator:
  - name: excalidash-backend-secrets
    namespace: excalidash-test
    literals:
      - JWT_SECRET=PLACEHOLDER_JWT_SECRET_CHANGE_ME
      - CSRF_SECRET=PLACEHOLDER_CSRF_SECRET_CHANGE_ME
    options:
      disableNameSuffixHash: true

patchesStrategicMerge:
  - |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: excalidash-backend-config
    data:
      FRONTEND_URL: "https://draw-test.ninjatronics.io"
