apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkding
  namespace: apps
spec:
  interval: 15m
  chart:
    spec:
      chart: linkding
      sourceRef:
        kind: HelmRepository
        name: pascaliske
        namespace: flux-system
      interval: 1h
  values:
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 33
      runAsGroup: 33
      fsGroup: 33
      fsGroupChangePolicy: "OnRootMismatch"
      seccompProfile:
        type: RuntimeDefault

    containerSecurityContext:
      allowPrivilegeEscalation: false
      privileged: false
      capabilities:
        drop:
          - ALL

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      - name: TZ
        value: America/Los_Angeles # Correct for Ridgecrest, CA
      - name: LD_SUPERUSER_NAME
        valueFrom:
          secretKeyRef:
            name: linkding-secret
            key: LD_SUPERUSER_NAME
      - name: LD_SUPERUSER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: linkding-secret
            key: LD_SUPERUSER_PASSWORD
    persistentVolumeClaim:
      create: true
      size: 1Gi
    service:
      type: ClusterIP
