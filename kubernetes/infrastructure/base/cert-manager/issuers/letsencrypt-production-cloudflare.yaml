apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production-cloudflare
spec:
  acme:
    email: 06ninjatronics@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory # Real production endpoint
    privateKeySecretRef:
      name: letsencrypt-production-cloudflare-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
