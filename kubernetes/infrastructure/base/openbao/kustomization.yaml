apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: openbao-values
    namespace: openbao
    files:
      - values.yaml=helm-values.yaml

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - ingress.yaml
